<!-- クラス参加画面 -->

<!DOCTYPE html>
<html lang="ja">

<head>

  <!-- 文字コード -->
  <meta charset="UTF-8">

  <!-- スマホ対応 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- タイトル -->
  <title>クラスに参加</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/joinclass.css">

</head>

<body>

  <!-- 画面全体 -->
  <div class="window">

    <!-- 上のバー -->
    <div class="topbar">

      <!-- 戻るボタン -->
      <button class="backBtn" id="backBtn">
        ＜
      </button>

      <!-- タイトル -->
      <h2>クラスに参加</h2>

    </div>

    <!-- 中身 -->
    <div class="content">

      <!-- クラスコード -->
      <input
        type="text"
        id="classCodeInput"
        placeholder="クラスコード"
      >

      <!-- ニックネーム -->
      <input
        type="text"
        id="nicknameInput"
        placeholder="ニックネーム"
      >

      <!-- 参加ボタン -->
      <button id="joinBtn">

        参加

      </button>

    </div>

  </div>

  <!-- JavaScript -->
  <script type="module" src="../js/joinclass.js"></script>

</body>

</html>
