<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>クラス選択</title>

  <link rel="stylesheet" href="../css/chooseclass.css">
</head>

<body>

  <!-- クラス選択画面 -->
  <div class="page">

    <!-- タイトル -->
    <h1>文化祭準備<br>アプリ</h1>

    <!-- クラスを作成 -->
    <button class="classBtn" id="createClassBtn">
      <span class="icon">＋</span>
      クラスを作成
    </button>

    <!-- クラスに参加 -->
    <button class="classBtn" id="joinClassBtn">
      <span class="icon">👥</span>
      クラスに参加
    </button>

    <!-- 説明 -->
    <p class="note">クラスコードを入力して参加</p>

  </div>

  <script type="module" src="../js/chooseclass.js"></script>

</body>

</html>
