<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>新規登録</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/signup.css">
</head>

<body>

  <!-- 新規登録画面 -->
  <div class="window">

    <!-- 上のバー -->
    <div class="topbar">

      <!-- ×ボタン -->
      <button class="closeBtn" id="backBtn">
        ×
      </button>

      <!-- タイトル -->
      <h2>新規登録</h2>

    </div>



   <!-- 中身 -->
<div class="content">

  <!-- 大きいタイトル -->
  <h1>新規登録</h1>

  <!-- メールアドレス -->
  <div class="inputArea">

    <input
      type="email"
      id="emailInput"
      placeholder="メールアドレス"
    >

  </div>


  <!-- パスワード -->
  <div class="inputArea passwordArea">

    <input
      type="password"
      id="passwordInput"
      placeholder="パスワード"
    >

    <!-- 🐵ボタン -->
    <button id="eyeBtn">

      🙈

    </button>

  </div>

<!-- OKボタン -->
<button class="okBtn" id="okBtn">

  OK

</button>

    </div>

  </div>



  <!-- Firebase -->
  <script type="module" src="../js/firebase.js"></script>

  <!-- JavaScript -->
  <script type="module" src="../js/signup.js"></script>

</body>

</html>
